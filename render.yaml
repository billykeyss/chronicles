services:
  - type: web
    runtime: static
    name: chronicles
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter web build
    staticPublishPath: ./apps/web/out
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
